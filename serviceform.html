<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Book a Service | Meedi Plant Care</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
   /* RESET & BASE */
*{
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f8f4;
}

/* HEADER */
#head {
    background: #2e7d32;
    color: white;
    text-align: center;
    padding: 15px;
    font-size: 1.4rem;
}

/* FORM CONTAINER */
.container {
    max-width: 600px;
    margin: 30px auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* HEADINGS */
h2 {
    color: #2e7d32;
    text-align: center;
}

/* FORM ELEMENTS */
label {
    display: block;
    margin-top: 15px;
    font-weight: bold;
}

input,
select,
textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 5px;
    border: 1px solid #ccc;
    font-size: 15px;
}

/* BUTTON */
button {
    margin-top: 20px;
    width: 100%;
    padding: 12px;
    background: #2e7d32;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #1b5e20;
}

/* NOTE */
.note {
    font-size: 13px;
    color: #555;
    margin-top: 10px;
    text-align: center;
}

/* ================= RESPONSIVE ================= */

/* TABLET */
@media (max-width: 768px){
    #head {
        font-size: 1.2rem;
        padding: 12px;
    }

    .container {
        margin: 20px;
        padding: 20px;
    }

    h2 {
        font-size: 22px;
    }
}

/* MOBILE */
@media (max-width: 480px){
    #head {
        font-size: 1.1rem;
        padding: 10px;
    }

    .container {
        margin: 15px;
        padding: 18px;
    }

    input,
    select,
    textarea {
        font-size: 14px;
        padding: 9px;
    }

    button {
        font-size: 15px;
        padding: 10px;
    }

    .note {
        font-size: 12px;
    }
}

  </style>
</head>
<body>


  <h1 id="head">🧑‍🌾 Book Garden Decoration Service</h1>
<div class="container">
  <h2>Service Booking Form</h2>
  <form>
    <label>Full Name</label>
    <input type="text" placeholder="Enter your name" required>

    <label>Phone Number</label>
    <input type="tel" placeholder="Enter phone number" required>

    <label>Email</label>
    <input type="email" placeholder="Enter email">

    <label>Select Service</label>
    <select required>
      <option value="">-- Select Service --</option>
      <option>Garden Decoration</option>
      <option>Balcony Garden Service</option>
      <option>Event Garden Decoration</option>
      <option>Monthly Maintenance</option>
    </select>

    <label>Preferred Date</label>
    <input type="date" required>

    <label>Address</label>
    <textarea rows="3" placeholder="Enter service address" required></textarea>

    <label>Additional Notes (optional)</label>
    <textarea rows="3" placeholder="Any special requirements"></textarea>

    <button type="submit">Confirm Booking</button>
  </form>

  <p class="note">Our team will contact you within 24 hours to confirm the service.</p>
</div>
</body>
</html>
