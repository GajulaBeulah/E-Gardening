<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Product</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f4f6f8;
            color: #333;
        }

        /* Header */
        header {
            background: #2e7d32;
            padding: 15px 40px;
            color: #fff;
        }

        header h1 {
            font-size: 24px;
        }

        /* Form Section */
        .edit-product-section {
            padding: 50px 40px;
            max-width: 900px;
            margin: auto;
        }

        .edit-product-section h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .edit-form {
            background: #fff;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        .form-group textarea {
            resize: none;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #2e7d32;
        }

        /* Image Preview */
        .image-preview {
            margin-bottom: 20px;
            text-align: center;
        }

        .image-preview img {
            max-width: 200px;
            border-radius: 10px;
            border: 1px solid #ddd;
        }

        .btn-save {
            width: 100%;
            padding: 14px;
            background: #2e7d32;
            border: none;
            color: #fff;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-save:hover {
            background: #256428;
        }

        /* Footer */
        footer {
            background: #1b1b1b;
            color: #ccc;
            padding: 40px 40px 20px;
            margin-top: 60px;
        }

        .footer-bottom {
            text-align: center;
            font-size: 14px;
            border-top: 1px solid #333;
            padding-top: 15px;
        }
    </style>
</head>
<body>

<!-- Header -->
<header>
    <h1>Edit Product</h1>
</header>

<!-- Edit Product Form -->
<section class="edit-product-section">
    <h2>Update Product Details ✏️</h2>

    <form class="edit-form">
        <!-- Image Placeholder -->
        <!-- <div class="image-preview">
            <img src="https://via.placeholder.com/200" alt="Product Image">
        </div> -->

        <div class="form-group">
            <label>Product Name</label>
            <input type="text" placeholder="Enter product name">
        </div>

        <div class="form-group">
            <label>Product Price</label>
            <input type="number" placeholder="Enter product price">
        </div>

        <div class="form-group">
            <label>Change Product Image</label>
            <input type="file">
        </div>

        <div class="form-group">
            <label>Product Information</label>
            <textarea rows="4" placeholder="Enter product details"></textarea>
        </div>

        <button type="submit" class="btn-save">Save Changes</button>
    </form>
</section>

<!-- Footer -->
<footer>
    <div class="footer-bottom">
        © 2026 Seller Dashboard. All rights reserved.
    </div>
</footer>

</body>
</html>
