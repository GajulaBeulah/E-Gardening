<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Products Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f4f6f8;
            color: #333;
        }

        /* Header */
        header {
            background: #2e7d32;
            padding: 15px 40px;
            color: #fff;
        }

        header h1 {
            font-size: 24px;
        }

        /* Products Section */
        .products-section {
            padding: 50px 40px;
            max-width: 1200px;
            margin: auto;
        }

        .products-section h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .products-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .product-card {
            background: #fff;
            padding: 50px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .product-card h3 {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .product-card p {
            font-size: 26px;
            font-weight: bold;
            color: #2e7d32;
        }

        /* Actions */
        .product-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
        }

        .action-card {
            background: #fff;
            padding: 50px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .action-card h3 {
            margin-bottom: 15px;
            font-size: 20px;
        }

        .action-card button {
            padding: 10px 22px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            color: #fff;
        }

        .btn-edit {
            background: #2e7d32;
        }

        .btn-edit:hover {
            background: #256428;
        }

        .btn-delete {
            background: #d32f2f;
        }

        .btn-delete:hover {
            background: #b71c1c;
        }

        /* Footer */
        footer {
            background: #1b1b1b;
            color: #ccc;
            padding: 40px 40px 20px;
            margin-top: 400px;
        }

        .footer-bottom {
            text-align: center;
            font-size: 14px;
            border-top: 1px solid #333;
            padding-top: 15px;
        }
    </style>
</head>
<body>

<!-- Header -->
<header>
    <h1>Products Dashboard</h1>
</header>

<!-- Products Content -->
<section class="products-section">
    <h2>Products Overview 🛒</h2>

    <!-- Stats -->
    <div class="products-cards">
        <div class="product-card">
            <h3>Total Products</h3>
            <p>120</p>
        </div>

        <div class="product-card">
            <h3>Current Products</h3>
            <p>95</p>
        </div>
    </div>

    <!-- Actions -->
    <div class="product-actions">
        <div class="action-card">
            <h3>Change Product</h3>
           <a href="./edit product.html"> <button class="btn-edit">Edit Product</button></a>
        </div>

        <div class="action-card">
            <h3>Delete Product</h3>
            <a href="./delete.html"><button class="btn-delete">Delete Product</button></a>
        </div>
    </div>
</section>

<!-- Footer -->
<footer>
    <div class="footer-bottom">
        © 2026 Seller Dashboard. All rights reserved.
    </div>
</footer>

</body>
</html>
