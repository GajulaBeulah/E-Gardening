<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delete Product</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f4f6f8;
            color: #333;
        }

        /* Header */
        header {
            background: #2e7d32;
            padding: 15px 40px;
            color: #fff;
        }

        header h1 {
            font-size: 24px;
        }

        /* Delete Section */
        .delete-section {
            padding: 50px 40px;
            max-width: 900px;
            margin: auto;
        }

        .delete-section h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
            color: #d32f2f;
        }

        .delete-form {
            background: #fff;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .warning-box {
            background: #fdecea;
            color: #b71c1c;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        .form-group textarea {
            resize: none;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #d32f2f;
        }

        .confirm-box {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .confirm-box input {
            width: auto;
        }

        .btn-delete {
            width: 100%;
            padding: 14px;
            background: #d32f2f;
            border: none;
            color: #fff;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-delete:hover {
            background: #b71c1c;
        }

        /* Footer */
        footer {
            background: #1b1b1b;
            color: #ccc;
            padding: 40px 40px 20px;
            margin-top: 60px;
        }

        .footer-bottom {
            text-align: center;
            font-size: 14px;
            border-top: 1px solid #333;
            padding-top: 15px;
        }
    </style>
</head>
<body>

<!-- Header -->
<header>
    <h1>Delete Product</h1>
</header>

<!-- Delete Product Form -->
<section class="delete-section">
    <h2>Delete Product 🗑️</h2>

    <form class="delete-form">
        <div class="warning-box">
            ⚠️ Warning: This action is permanent and cannot be undone.
        </div>

        <div class="form-group">
            <label>Product Name</label>
            <input type="text" placeholder="Enter product name">
        </div>

        <div class="form-group">
            <label>Product Issue / Reason for Deletion</label>
            <textarea rows="4" placeholder="Explain why you want to delete this product"></textarea>
        </div>

        <div class="confirm-box">
            <input type="checkbox" id="confirmDelete">
            <label for="confirmDelete">
                I confirm that I want to permanently delete this product
            </label>
        </div>

        <button type="submit" class="btn-delete">Confirm Delete</button>
    </form>
</section>

<!-- Footer -->
<footer>
    <div class="footer-bottom">
        © 2026 Seller Dashboard. All rights reserved.
    </div>
</footer>

</body>
</html>
