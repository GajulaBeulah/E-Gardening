<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Orders Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f4f6f8;
            color: #333;
        }

        /* Header */
        header {
            background: #2e7d32;
            padding: 15px 40px;
            color: #fff;
        }

        header h1 {
            font-size: 24px;
        }

        /* Orders Section */
        .orders-section {
            padding: 50px 40px;
            max-width: 1200px;
            margin: auto;
        }

        .orders-section h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .orders-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .orders-card {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .orders-card h3 {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .orders-card p {
            font-size: 26px;
            font-weight: bold;
            color: #2e7d32;
        }

        /* Analytics */
        .analytics {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .analytics h3 {
            margin-bottom: 20px;
            font-size: 22px;
            text-align: center;
        }

        canvas {
            max-width: 100%;
        }

        /* Footer */
        footer {
            background: #1b1b1b;
            color: #ccc;
            padding: 40px 40px 20px;
            margin-top: 60px;
        }

        .footer-bottom {
            text-align: center;
            font-size: 14px;
            border-top: 1px solid #333;
            padding-top: 15px;
        }
    </style>
</head>
<body>

<!-- Header -->
<header>
    <h1>Orders Dashboard</h1>
</header>

<!-- Orders Content -->
<section class="orders-section">
    <h2>Orders Overview 📦</h2>

    <div class="orders-cards">
        <div class="orders-card">
            <h3>Total Orders</h3>
            <p>320</p>
        </div>

        <div class="orders-card">
            <h3>Current Orders</h3>
            <p>45</p>
        </div>

        <div class="orders-card">
            <h3>Pending Orders</h3>
            <p>12</p>
        </div>
    </div>

    <!-- Analytics Chart -->
    <div class="analytics">
        <h3>Orders Analytics</h3>
        <canvas id="ordersChart" height="120"></canvas>
    </div>
</section>

<!-- Footer -->
<footer>
    <div class="footer-bottom">
        © 2026 Seller Dashboard. All rights reserved.
    </div>
</footer>

<!-- Chart Script -->
<script>
    const ctx = document.getElementById('ordersChart').getContext('2d');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Total Orders', 'Current Orders', 'Pending Orders'],
            datasets: [{
                label: 'Orders Count',
                data: [320, 45, 12],
                backgroundColor: [
                    '#66bb6a',
                    '#2e7d32',
                    '#ffa726'
                ],
                borderRadius: 8
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    display: false
                }
            },
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
</script>

</body>
</html>
