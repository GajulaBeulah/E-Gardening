<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Garden Store</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e8eef7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            max-width: 450px;
            width: 100%;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            background: linear-gradient(135deg, #1a237e 0%, #0d1753 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .login-header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-header p {
            font-size: 14px;
            opacity: 0.9;
            color: #c5cae9;
        }

        .login-body {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #1a237e;
            font-weight: 600;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        input:focus {
            outline: none;
            border-color: #3f51b5;
            box-shadow: 0 0 0 3px rgba(63, 81, 181, 0.1);
        }

        input::placeholder {
            color: #999;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 13px;
        }

        .remember-forgot a {
            color: #1a237e;
            text-decoration: none;
            transition: 0.3s ease;
        }

        .remember-forgot a:hover {
            color: #3f51b5;
            text-decoration: underline;
        }

        .checkbox {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .checkbox input[type="checkbox"] {
            width: auto;
            cursor: pointer;
        }

        .login-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #1a237e 0%, #0d1753 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .login-btn:hover {
            background: linear-gradient(135deg, #3f51b5 0%, #1a237e 100%);
            box-shadow: 0 8px 20px rgba(63, 81, 181, 0.3);
            transform: translateY(-2px);
        }

        .security-badge {
            background: #f3e5f5;
            border-left: 4px solid #3f51b5;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #512da8;
        }

        .security-badge::before {
            content: '🔒 ';
            margin-right: 5px;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
        }

        .back-link a {
            color: #999;
            text-decoration: none;
            transition: 0.3s ease;
        }

        .back-link a:hover {
            color: #1a237e;
        }

        .admin-only {
            background: #fff3e0;
            border: 1px solid #ffe0b2;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #e65100;
        }

        .admin-only::before {
            content: '⚠️ ';
            margin-right: 5px;
        }

        @media (max-width: 480px) {
            .login-container {
                border-radius: 10px;
            }

            .login-header {
                padding: 30px 20px;
            }

            .login-header h1 {
                font-size: 26px;
            }

            .login-body {
                padding: 30px 20px;
            }

            .remember-forgot {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>⚙️ Admin Login</h1>
            <p>Garden Store Administration Panel</p>
        </div>
        <div class="login-body">
            <div class="admin-only">
                Admin access only. Unauthorized access is prohibited.
            </div>

            <form class="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">Admin Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter admin username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <div class="form-group">
                    <label for="code">Two-Factor Code (Optional)</label>
                    <input type="text" id="code" name="code" placeholder="6-digit code from authenticator">
                </div>

                <div class="remember-forgot">
                    <label class="checkbox">
                        <input type="checkbox" name="remember">
                        <span>Remember this device</span>
                    </label>
                    <a href="#">Forgot password?</a>
                </div>

                <div class="security-badge">
                    Secure connection - This portal is protected with SSL encryption
                </div>

                <button type="submit" class="login-btn">Access Admin Dashboard</button>
            </form>

            <div class="back-link">
                <a href="/project/seller.html">← Back to Portal Selection</a>
            </div>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const code = document.getElementById('code').value;
            
            // Basic validation
            if (!username || !password) {
                alert('Please enter username and password');
                return;
            }
            
            console.log('Admin login attempt:', { username, code: code ? 'provided' : 'not provided' });
            alert(`Welcome Admin! You've logged in successfully.`);
            
            // Redirect to admin dashboard
            window.location.href = '/project/admin-dashboard.html';
        }
    </script>
</body>
</html>
