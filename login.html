<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Garden Store</title>
    <link rel="stylesheet" href="./header.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e8eef7 100%);
            min-height: 100vh;
            /* display: flex; */
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container{
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            max-width: 450px;
            width: 100%;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            background: linear-gradient(135deg, #2d5016 0%, #1a3a0a 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .login-header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-header p {
            font-size: 14px;
            opacity: 0.9;
            color: #d4f1d4;
        }

        .login-body {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #2d5016;
            font-weight: 600;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        input:focus {
            outline: none;
            border-color: #76ff03;
            box-shadow: 0 0 0 3px rgba(118, 255, 3, 0.1);
        }

        input::placeholder {
            color: #999;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 13px;
        }

        .remember-forgot a {
            color: #2d5016;
            text-decoration: none;
            transition: 0.3s ease;
        }

        .remember-forgot a:hover {
            color: #76ff03;
            text-decoration: underline;
        }

        .checkbox {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .checkbox input[type="checkbox"] {
            width: auto;
            cursor: pointer;
        }

        .login-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #2d5016 0%, #1a3a0a 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .login-btn:hover {
            background: linear-gradient(135deg, #76ff03 0%, #5fd902 100%);
            color: #1a3a0a;
            box-shadow: 0 8px 20px rgba(118, 255, 3, 0.3);
            transform: translateY(-2px);
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            color: #999;
            font-size: 13px;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #ddd;
            z-index: -1;
        }

        .divider span {
            background: white;
            padding: 0 10px;
        }

        .social-login {
            display: flex;
            gap: 10px;
        }

        .social-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
            color: #333;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .social-btn:hover {
            border-color: #76ff03;
            background: #f9fff6;
        }

        .signup-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        .signup-link a {
            color: #2d5016;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s ease;
        }

        .signup-link a:hover {
            color: #76ff03;
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .login-container {
                border-radius: 10px;
            }

            .login-header {
                padding: 30px 20px;
            }

            .login-header h1 {
                font-size: 26px;
            }

            .login-body {
                padding: 30px 20px;
            }

            .remember-forgot {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .social-login {
                flex-direction: column;
            }

            .social-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header>
    <div class="logo">🌿 Garden</div>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    <nav id="navbar">
        <a href="./Index.html">Home</a>
        <a href="./Index.html">Plant Care</a>
        <a href="./Index.html">About us</a>
    </nav>
    <!-- <div class="icons"><span>🔍</span>
        <a href="./login.html" class="auth-link">Login</a>
        <a href="./register.html" class="auth-link">Register</a>
        <span>👤</span>
    </div> -->
</header>
    <div class="container">
        <div class="login-container">
        <div class="login-header">
            <h1>🌿 Garden</h1>
            <p>Welcome back to your garden</p>
        </div>
        <div class="login-body">
            <form class="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <div class="remember-forgot">
                    <label class="checkbox">
                        <input type="checkbox" name="remember">
                        <span>Remember me</span>
                    </label>
                    <a href="#">Forgot password?</a>
                </div>

                <button type="submit" class="login-btn">Login</button>
            </form>

            <div class="divider">

            <div class="signup-link">
                Don't have an account? <a href="/project/register.html">Sign up here</a>
            </div>
        </div>
        </div>
    </div>
    </div>
<footer>
        <p>© 2026 Garden</p>
    </footer>
    <script>
        function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            console.log('Login attempt:', { email, password });
            alert('Welcome! Login successful.');
            // Redirect to home page
            window.location.href = '/project/plant-care/plantcare.html';
        }

        function loginWithGoogle() {
            alert('Google login functionality would be implemented here');
        }

        function loginWithFacebook() {
            alert('Facebook login functionality would be implemented here');
        }
    </script>
</body>
</html>
